name: Agent Package

on:
  workflow_dispatch:
  push:
    tags:
      - "agent-v*"

jobs:
  build-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcctl-agent-package
          path: dist/*
